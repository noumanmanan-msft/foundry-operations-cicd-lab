name: deploy-dev-foundry

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'environments/dev/**'
      - 'foundry/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      git-ref:
        description: Git ref to deploy to Dev
        required: false
        type: string

jobs:
  dev:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs['git-ref'] || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Foundry SDK dependencies
        run: pip install azure-ai-projects azure-identity

      - name: Validate asset graph
        run: python scripts/validate_foundry_assets.py

      - name: Render environment bundle
        run: |
          python scripts/render_foundry_bundle.py \
            --environment dev \
            --output .dist/dev-bundle.json

      - name: Publish promotion artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-dev-${{ github.sha }}
          path: .dist/dev-bundle.json

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy agent to Foundry
        run: |
          python scripts/deploy_agent_to_foundry.py \
            --agent-name "incident-triage-hosted" \
            --environment "dev" \
            --version "${{ github.sha }}"