name: release-foundry-bundle

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      git-ref:
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-ref || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate asset graph
        run: python scripts/validate_foundry_assets.py

      - name: Render environment bundle
        run: python scripts/render_foundry_bundle.py --environment ${{ inputs.environment }} --output .dist/${{ inputs.environment }}-bundle.json

      - name: Publish promotion artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-${{ inputs.environment }}-${{ github.sha }}
          path: .dist/${{ inputs.environment }}-bundle.json

      - name: Deployment handoff summary
        run: |
          echo "Prepared ${{ inputs.environment }} bundle from ref ${{ inputs.git-ref || github.sha }}"
          echo "Next step: wire direct Foundry deployment commands or secure runner integration."