name: export-sync

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: Agent name to export and sync
        required: true
        type: string
      environment:
        description: Source environment to export from
        required: true
        type: choice
        default: dev
        options:
          - dev
          - qa
          - prod

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  export-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Foundry SDK dependencies
        run: pip install azure-ai-projects azure-identity

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Export and sync from Foundry
        run: |
          python scripts/export_agent_from_foundry.py \
            --agent-name "${{ inputs.agent_name }}" \
            --environment "${{ inputs.environment }}" \
            --sync-repo

      - name: Validate synced assets (strict)
        run: python scripts/validate_foundry_assets.py --strict

      - name: Compute sync delta
        id: delta
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to sync from ${{ inputs.environment }}"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          CHANGED_FILES="$(git diff --name-only)"

          {
            echo "changed_files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          SAFE_AGENT="$(echo "${{ inputs.agent_name }}" | tr '[:space:]/' '--')"
          echo "branch_name=export-sync/${SAFE_AGENT}-${{ inputs.environment }}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.delta.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.delta.outputs.branch_name }}
          base: develop
          title: "chore: sync ${{ inputs.agent_name }} from ${{ inputs.environment }}"
          body: |
            This PR was auto-generated by the `export-sync` workflow.

            Source:
            - Agent: `${{ inputs.agent_name }}`
            - Environment: `${{ inputs.environment }}`
            - Workflow run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`

            Changed files:
            ${{ steps.delta.outputs.changed_files }}

            Review checklist:
            - Confirm the exported state matches the intended portal change
            - Confirm no unexpected files were modified
            - The validator has already passed against this state in CI
          commit-message: "chore: sync ${{ inputs.agent_name }} from ${{ inputs.environment }}"
          labels: automated, foundry-sync

      - name: No changes summary
        if: steps.delta.outputs.has_changes == 'false'
        run: echo "No changes to sync from ${{ inputs.environment }}"
