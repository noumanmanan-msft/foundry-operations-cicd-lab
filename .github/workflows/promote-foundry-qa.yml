name: promote-foundry-qa

on:
  workflow_run:
    workflows:
      - deploy-dev-foundry
    types:
      - completed
  workflow_dispatch:
    inputs:
      agent-name:
        description: "Agent name to promote (must match 'name' field in foundry/agents/ JSON)"
        required: true
        type: string
        default: incident-triage-hosted
      agent-version:
        description: "Version tag to stamp on the agent (e.g. v1.2.0)"
        required: true
        type: string
      git-ref:
        description: "Git ref to deploy from (branch, tag, or SHA — defaults to main)"
        required: false
        type: string

jobs:
  promote-qa:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/release-foundry-bundle.yml
    with:
      environment: qa
      agent_name: ${{ github.event_name == 'workflow_dispatch' && inputs['agent-name'] || 'incident-triage-hosted' }}
      agent_version: ${{ github.event_name == 'workflow_dispatch' && inputs['agent-version'] || github.event.workflow_run.head_sha }}
      git_ref: ${{ github.event_name == 'workflow_dispatch' && inputs['git-ref'] || github.event.workflow_run.head_sha }}
    secrets: inherit