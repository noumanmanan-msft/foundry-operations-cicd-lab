name: promote-foundry-qa

on:
  workflow_run:
    workflows:
      - deploy-dev-foundry
    types:
      - completed
  workflow_dispatch:
    inputs:
      agent-name:
        description: "Agent name to promote (must match 'name' field in foundry/agents/ JSON)"
        required: true
        type: string
        default: incident-triage-hosted
      agent-version:
        description: "Version tag to stamp on the agent (e.g. v1.2.0)"
        required: true
        type: string
      git-ref:
        description: "Git ref to deploy from (branch, tag, or SHA — defaults to main)"
        required: false
        type: string

jobs:
  promote-qa:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs['git-ref'] || github.event.workflow_run.head_sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Foundry SDK dependencies
        run: pip install azure-ai-projects azure-identity

      - name: Validate asset graph
        run: python scripts/validate_foundry_assets.py

      - name: Render environment bundle
        run: |
          python scripts/render_foundry_bundle.py \
            --environment qa \
            --output .dist/qa-bundle.json

      - name: Publish promotion artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-qa-${{ github.sha }}
          path: .dist/qa-bundle.json

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy agent to Foundry
        run: |
          python scripts/deploy_agent_to_foundry.py \
            --agent-name "${{ github.event_name == 'workflow_dispatch' && inputs['agent-name'] || 'incident-triage-hosted' }}" \
            --environment "qa" \
            --version "${{ github.event_name == 'workflow_dispatch' && inputs['agent-version'] || github.event.workflow_run.head_sha }}"

      - name: Verify promoted MCP wiring (QA)
        env:
          AGENT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs['agent-name'] || 'incident-triage-hosted' }}
        run: |
          set -euo pipefail
          python scripts/export_agent_from_foundry.py \
            --agent-name "$AGENT_NAME" \
            --environment qa \
            --output .dist/qa-live-export.json

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('.dist/qa-live-export.json').read_text())
          tools = (payload.get('agent', {}) or {}).get('tools') or []
          mcp_tool = next((t for t in tools if (t.get('type') or '').lower() == 'mcp'), None)
          if not mcp_tool:
              raise SystemExit('No MCP tool attached after QA promotion.')

          conn_name = (mcp_tool.get('project_connection_id') or '').strip()
          if not conn_name.endswith('-qa'):
              raise SystemExit(f"QA MCP connection is not environment-scoped: '{conn_name}'")

          server_url = (mcp_tool.get('server_url') or '').strip()
          if 'srch-qa-' not in server_url:
              raise SystemExit(f"QA MCP server_url does not target QA search endpoint: '{server_url}'")

          kb_names = [
              (item or {}).get('name', '').strip()
              for item in (payload.get('knowledgeBases') or [])
          ]
          if 'kb-iq-v1' not in kb_names:
              raise SystemExit(f"QA knowledgebase 'kb-iq-v1' not found in live export. Found: {kb_names}")

          ks_names = [
              (item or {}).get('name', '').strip()
              for item in (payload.get('knowledgeSources') or [])
          ]
          if 'ks-azure-ai-searchindex' not in ks_names:
              raise SystemExit(f"QA knowledge source 'ks-azure-ai-searchindex' not found in live export. Found: {ks_names}")

          summary = [
              '### QA Foundry IQ Verification',
              f'- MCP connection: {conn_name}',
              f'- MCP endpoint: {server_url}',
              f'- Knowledge bases: {", ".join(kb_names) or "none"}',
              f'- Knowledge sources: {", ".join(ks_names) or "none"}',
          ]
          step_summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if step_summary:
              Path(step_summary).write_text("\n".join(summary) + "\n")

          print(f"QA promotion wiring verified: connection={conn_name}; knowledgebases={kb_names}; knowledgesources={ks_names}")
          PY